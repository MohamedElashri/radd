name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Release checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # sanad: ref=v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # sanad: ref=v1
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # sanad: ref=v2.9.1

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Test
        run: cargo test

  build:
    name: Build ${{ matrix.asset_name }}
    needs: check
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            asset_name: linux-amd64
          - os: ubuntu-24.04-arm
            asset_name: linux-arm64
          - os: macos-15-intel
            asset_name: macos-amd64
          - os: macos-15
            asset_name: macos-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # sanad: ref=v6.0.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # sanad: ref=v1

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # sanad: ref=v2.9.1

      - name: Build release binary
        run: |
          cargo build --locked --release
          target/release/radd --version
          target/release/radd -v
          target/release/radd version

      - name: Package binary
        shell: bash
        run: |
          version="$(target/release/radd version | awk '{print $2}')"
          package="radd-v${version}-${{ matrix.asset_name }}"

          mkdir -p "dist/${package}"
          cp target/release/radd "dist/${package}/radd"
          cat > "dist/${package}/README.txt" <<EOF
          radd ${version}

          This archive contains the radd binary only.
          ROOT is still an external runtime dependency; install ROOT separately
          and make sure hadd is available on PATH, or pass --hadd to radd commands.

          Quick checks:
            ./radd --version
            ./radd doctor
          EOF

          tar -C dist -czf "dist/${package}.tar.gz" "${package}"
          (cd dist && shasum -a 256 "${package}.tar.gz" > "${package}.tar.gz.sha256")

      - name: Upload package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # sanad: ref=v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download packages
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # sanad: ref=v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # sanad: ref=v3.0.0
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
