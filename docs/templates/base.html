{{- define "base" -}}
{{- $repoURL := index .Config.Extra "repo_url" -}}
<!doctype html>
<html lang="{{ default .Config.Language "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if ne .Title .Config.Title }}{{ .Title }} | {{ end }}{{ .Config.Title }}</title>
  <meta name="description" content="{{ default .Description .Config.Description }}">
  <meta name="author" content="{{ .Config.Author }}">
  <link rel="canonical" href="{{ .CanonicalURL }}">
  <link rel="stylesheet" href="{{ asset "style.css" }}">
</head>
<body>
  <a class="skip-link" href="#content">Skip to content</a>
  <header class="site-header">
    <a class="brand" href="{{ .BasePath }}/" aria-label="radd documentation home">radd Docs</a>
    <nav aria-label="Primary navigation">
      <a{{ if eq .CurrentURL "/" }} class="active"{{ end }} href="{{ .BasePath }}/">Home</a>
      <a{{ if hasPrefix .CurrentURL "/guide/" }} class="active"{{ end }} href="{{ .BasePath }}/guide/">Guide</a>
      <a{{ if hasPrefix .CurrentURL "/reference/" }} class="active"{{ end }} href="{{ .BasePath }}/reference/">Reference</a>
      <a{{ if hasPrefix .CurrentURL "/developer/" }} class="active"{{ end }} href="{{ .BasePath }}/developer/">Developer</a>
      <a href="{{ $repoURL }}">GitHub</a>
    </nav>
  </header>
  <main id="content" class="page-shell">
    {{- template "content" . }}
  </main>
</body>
</html>
{{- end }}
